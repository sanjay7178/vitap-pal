name: macOS Build

on:
  workflow_dispatch:
    # inputs:
    #   architecture:
    #     description: 'macOS architecture'
    #     required: true
    #     default: 'both'
    #     type: choice
    #     options:
    #       - both
    #       - x86_64
    #       - aarch64


jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - os: macos-latest
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    steps:
    - uses: actions/checkout@v3

    - name: setup node
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: 'Setup Rust'
      uses: actions-rs/toolchain@v1
      with:
        default: true
        override: true
        profile: minimal
        toolchain: stable
        target: ${{ matrix.platform.rust_target }}

    - uses: Swatinem/rust-cache@v2

    - name: install dependencies (ubuntu only)
      if: matrix.platform.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf

    - name: install frontend dependencies
      run: npm install # or yarn install

    - uses: tauri-apps/tauri-action@v0
      id: tauri_build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: "v__VERSION__"
        releaseBody: "See the assets to download this version and install."
        releaseDraft: true
        prerelease: false
        projectPath: '.'
        args: '--target ${{ matrix.platform.rust_target }}'

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.platform.rust_target }}-artifacts
        path: |
          src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/deb/*.deb
          src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/appimage/*.AppImage
          src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg/*.dmg
          src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/macos/*.app
          src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/nsis/*.exe
          src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/msi/*.msi
        if-no-files-found: ignore

  publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      # Download the previously uploaded artifacts
      - uses: actions/download-artifact@v3
        with:
          path: artifacts
      # And create a release with the artifacts attached
      - name: 'create release'
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        with:
          draft: false
          files: ./artifacts/**/*