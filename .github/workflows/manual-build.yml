name: Manual Build Artifacts

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - rpm-only
          - windows
          - macos

jobs:
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.platform }}" == "all" ]]; then
            echo "matrix={\"include\":[{\"os\":\"ubuntu-latest\",\"platform\":\"linux\",\"target\":\"x86_64-unknown-linux-gnu\"},{\"os\":\"windows-latest\",\"platform\":\"windows\",\"target\":\"x86_64-pc-windows-msvc\"},{\"os\":\"macos-latest\",\"platform\":\"macos\",\"target\":\"x86_64-apple-darwin\"}]}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "rpm-only" ]]; then
            echo "matrix={\"include\":[{\"os\":\"ubuntu-latest\",\"platform\":\"linux\",\"target\":\"x86_64-unknown-linux-gnu\"}]}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "linux" ]]; then
            echo "matrix={\"include\":[{\"os\":\"ubuntu-latest\",\"platform\":\"linux\",\"target\":\"x86_64-unknown-linux-gnu\"}]}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "windows" ]]; then
            echo "matrix={\"include\":[{\"os\":\"windows-latest\",\"platform\":\"windows\",\"target\":\"x86_64-pc-windows-msvc\"}]}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "macos" ]]; then
            echo "matrix={\"include\":[{\"os\":\"macos-latest\",\"platform\":\"macos\",\"target\":\"x86_64-apple-darwin\"}]}" >> $GITHUB_OUTPUT
          fi
        shell: bash

  build:
    needs: determine-matrix
    strategy:
      fail-fast: false # Continue with other builds even if one fails
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Add Rust targets
        run: rustup target add ${{ matrix.target }}
        
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      # Linux-specific dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            rpm
            
      - name: Install frontend dependencies
        run: pnpm install
        
      # Platform-specific build commands
      - name: Build for Linux RPM
        if: github.event.inputs.platform == 'rpm-only' && matrix.platform == 'linux'
        run: pnpm run build:rpm
        
      - name: Build for Linux
        if: (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux') && matrix.platform == 'linux'
        run: pnpm run build:linux
        
      - name: Build for Windows
        if: (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows') && matrix.platform == 'windows'
        run: pnpm run build:windows
        
      - name: Build for macOS
        if: (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos') && matrix.platform == 'macos'
        run: pnpm run build:macos
        
      # Upload artifacts based on platform
      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: ignore
          
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
          
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: ignore
